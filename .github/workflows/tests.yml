name: Test Suites

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
      CORDIAL_SDK_API_KEY:
        required: true
      CORDIAL_SDK_BASE_URL:
        required: true
      CORDIAL_SDK_TEST_LIST_KEY:
        required: true
      CORDIAL_SDK_TEST_EMAILS:
        required: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cfengine: [ "lucee@5", "lucee@6", "adobe@2021", "adobe@2023" ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Setup CommandBox CLI
        uses: Ortus-Solutions/setup-commandbox@v2.0.1

      - name: Install Test Harness Dependencies
        run: |
          box install

      - name: Start ${{ matrix.cfengine }} Server
        env:
          CORDIAL_SDK_API_KEY: ${{ secrets.CORDIAL_SDK_API_KEY }}
          CORDIAL_SDK_BASE_URL: ${{ secrets.CORDIAL_SDK_BASE_URL }}
          CORDIAL_SDK_TEST_LIST_KEY: ${{ secrets.CORDIAL_SDK_TEST_LIST_KEY }}
          CORDIAL_SDK_TEST_EMAILS: ${{ secrets.CORDIAL_SDK_TEST_EMAILS }}
        run: |
          box server start cfengine=${{ matrix.cfengine }} port=49619 --noSaveSettings --noOpenBrowser --debug
          curl http://127.0.0.1:49619

      - name: Run Tests
        env:
          CORDIAL_SDK_API_KEY: ${{ secrets.CORDIAL_SDK_API_KEY }}
          CORDIAL_SDK_BASE_URL: ${{ secrets.CORDIAL_SDK_BASE_URL }}
          CORDIAL_SDK_TEST_LIST_KEY: ${{ secrets.CORDIAL_SDK_TEST_LIST_KEY }}
          CORDIAL_SDK_TEST_EMAILS: ${{ secrets.CORDIAL_SDK_TEST_EMAILS }}
        run: |
          mkdir -p tests/results
          box testbox run --verbose outputFile=tests/results/test-results outputFormats=json,antjunit

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: tests/results/**/*.xml
          check_name: "${{ matrix.cfengine }} Test Results"

      - name: Upload Test Results to Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.cfengine }}
          path: |
            tests/results/**/*

      - name: Show Server Log On Failures
        if: ${{ failure() }}
        run: |
          box server log

      - name: Upload Debug Logs To Artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: Failure Debugging Info - ${{ matrix.cfengine }}
          path: |
            .engine/**/logs/*
            .engine/**/WEB-INF/cfusion/logs/*

      - name: Slack Notifications
        if: ${{ failure() && !startsWith( 'pull_request', github.event_name ) }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: coding
          SLACK_COLOR: ${{ job.status }}
          SLACK_ICON_EMOJI: ":bell:"
          SLACK_MESSAGE: '${{ github.repository }} tests failed :cry:'
          SLACK_TITLE: ${{ github.repository }} Tests For ${{ matrix.cfengine }} failed
          SLACK_USERNAME: CI
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
